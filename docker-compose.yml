version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: duet_postgres
    environment:
      POSTGRES_USER: duet
      POSTGRES_PASSWORD: duet_dev_password
      POSTGRES_DB: duet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - duet_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duet"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: duet_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - duet_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  duet_network:
    driver: bridge
